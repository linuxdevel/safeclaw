<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeClaw WebChat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>SafeClaw</h1>
    </header>
    <main id="messages"></main>
    <footer>
      <form id="chat-form">
        <input
          type="text"
          id="chat-input"
          placeholder="Type a message..."
          autocomplete="off"
          autofocus
        />
        <button type="submit">Send</button>
      </form>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
